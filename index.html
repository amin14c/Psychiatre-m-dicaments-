// ── PUBMED ──
async function pubmed(q,max=5){
  try{
    const r=await fetch(`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=${encodeURIComponent(q)}&retmax=${max}&sort=date&retmode=json&datetype=pdat&mindate=2020&maxdate=2025`);
    const d=await r.json();
    const ids=d.esearchresult?.idlist||[];
    if(!ids.length)return[];
    const r2=await fetch(`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi?db=pubmed&id=${ids.join(",")}&retmode=json`);
    const d2=await r2.json();
    return ids.map(id=>{const a=d2.result?.[id]||{};return{title:a.title||"",authors:(a.authors||[]).slice(0,2).map(x=>x.name).join(", "),journal:a.source||"",year:(a.pubdate||"").slice(0,4),pmid:id};}).filter(a=>a.title);
  }catch{return[];}
}

async function fda(drug){
  try{
    const r=await fetch(`https://api.fda.gov/drug/label.json?search=openfda.generic_name:"${encodeURIComponent(drug)}"&limit=1`);
    const d=await r.json();
    const res=d.results?.[0]||{};
    return{interactions:(res.drug_interactions||[""])[0].slice(0,300),contra:(res.contraindications||[""])[0].slice(0,300)};
  }catch{return null;}
}

// DRUG AUTOCOMPLETE
// ════════════════════════════════════════════
function DrugAC({list,onChange,ph="Taper le nom..."}){
  const[q,setQ]=useState("");
  const[sugg,setSugg]=useState([]);
  const[show,setShow]=useState(false);
  const[modal,setModal]=useState(null);
  const wRef=useRef();

  useEffect(()=>{
    const h=(e)=>{if(wRef.current&&!wRef.current.contains(e.target))setShow(false);};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[]);

  const onType=(v)=>{
    setQ(v);
    if(!v.trim()){setSugg([]);setShow(false);return;}
    const m=DRUGS.filter(d=>d.dci.toLowerCase().startsWith(v.toLowerCase())).slice(0,8);
    setSugg(m);setShow(m.length>0);
  };

  const openM=(drug)=>{setModal({drug,dose:drug.doses[0],freq:"1 fois/j"});setShow(false);setQ("");};

  const confirm=()=>{
    if(!modal)return;
    onChange([...list,{dci:modal.drug.dci,cls:modal.drug.cls,dose:modal.dose,freq:modal.freq}]);
    setModal(null);
  };

  const fi={padding:"10px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,fontFamily:"inherit",fontSize:14,color:C.text,outline:"none",background:"#fff",width:"100%"};

  return(
    <div ref={wRef} style={{position:"relative"}}>
      <div style={{display:"flex",gap:8}}>
        <input style={{...fi,flex:1,direction:"ltr"}} value={q} onChange={e=>onType(e.target.value)}
          onFocus={()=>q&&sugg.length&&setShow(true)} placeholder={ph}/>
        <button style={{padding:"10px 14px",background:C.teal,color:"#fff",border:"none",borderRadius:8,fontSize:18,cursor:"pointer",flexShrink:0}}
          onClick={()=>{
            if(!q.trim())return;
            const d=DRUGS.find(x=>x.dci.toLowerCase()===q.toLowerCase());
            if(d)openM(d); else{onChange([...list,{dci:q,cls:"",dose:"",freq:""}]);setQ("");}
          }}>+</button>
      </div>

      {show&&(

      )}
    </div>
  );
}

function RxAI(){
  const[view,setView]     =useState(VIEWS.LOGIN);
  const[doc,setDoc]       =useState(()=>LS.get("rxai_doc",{name:"Dr. Amin Bellala",spec:"Psychiatre — Psychologue Clinicien",key:""}));
  const[lf,setLf]         =useState(()=>LS.get("rxai_doc",{name:"Dr. Amin Bellala",spec:"Psychiatre — Psychologue Clinicien",key:""}));
  const[patients,setPts]  =useState(()=>LS.get("rxai_pts",[]));
  const[stats,setStats]   =useState(()=>LS.get("rxai_stats",{today:0,ai:0}));
  const[pt,setPt]         =useState(emptyPt());
  const[aiRes,setAiRes]   =useState("");
  const[aiLd,setAiLd]     =useState(false);
  const[aiStep,setAiStep] =useState("");
  const[aiSrc,setAiSrc]   =useState([]);
  const[rxDrugs,setRxDrugs]=useState([]);
  const[rxText,setRxText] =useState("");
  const[rxInst,setRxInst] =useState("");
  const[sf,setSf]         =useState({name:"",spec:"",key:""});
  const[toast,setToast]   =useState(null);
  const[search,setSearch] =useState("");
  const[zoom,setZoom]     =useState(()=>LS.get("rxai_zoom",100));
  const toastRef          =useRef();
  const dateStr           =new Date().toLocaleDateString("fr-DZ",{year:"numeric",month:"long",day:"numeric"});
  const isNew             =[VIEWS.NEW,VIEWS.AI,VIEWS.RX].includes(view);

  // persist
  useEffect(()=>LS.set("rxai_pts",patients),[patients]);
  useEffect(()=>LS.set("rxai_stats",stats),[stats]);
  useEffect(()=>LS.set("rxai_zoom",zoom),[zoom]);

  const toast_show=useCallback((msg,type="ok")=>{
    clearTimeout(toastRef.current);
    setToast({msg,type});
    toastRef.current=setTimeout(()=>setToast(null),3500);
  },[]);

  const goto=(v)=>{
    if(v===VIEWS.NEW){setPt(emptyPt());setAiRes("");setAiSrc([]);setRxDrugs([]);setRxText("");setRxInst("");}
    if(v===VIEWS.SET)setSf({name:doc.name,spec:doc.spec,key:doc.key});
    setView(v);
  };

  const doLogin=()=>{
    if(!lf.name.trim()){toast_show("⚠️ أدخل اسم الطبيب","err");return;}
    if(!lf.key.trim()) {toast_show("⚠️ أدخل مفتاح Gemini","err");return;}
    const d={name:lf.name.trim(),spec:lf.spec.trim(),key:lf.key.trim()};
    setDoc(d);LS.set("rxai_doc",d);
    setView(VIEWS.DASH);
  };

  const savePt=(ptData)=>{
    const p=ptData||pt;
    if(!p.name.trim()){toast_show("⚠️ أدخل اسم المريض","err");return false;}
    if(!p.diag.trim()){toast_show("⚠️ أدخل التشخيص","err");return false;}
    const s={...p,date:new Date().toLocaleDateString("fr-DZ"),id:p.id||Date.now()};
    setPts(prev=>{const i=prev.findIndex(x=>x.id===s.id);if(i>=0){const n=[...prev];n[i]=s;return n;}return[...prev,s];});
    setPt(s);toast_show("✅ تم حفظ المريض");return true;
  };

  const goToAI=()=>{
    if(!pt.name.trim()){toast_show("⚠️ أدخل اسم المريض","err");return;}
    if(!pt.sym.trim()) {toast_show("⚠️ أدخل الأعراض","err");return;}
    if(!pt.diag.trim()){toast_show("⚠️ أدخل التشخيص","err");return;}
    setAiRes("");setAiSrc([]);setAiStep("");
    setView(VIEWS.AI);
  };

  const runAI=async()=>{
    if(!doc.key){toast_show("⚠️ مفتاح Gemini مفقود","err");return;}
    setAiLd(true);setAiRes("");setAiSrc([]);
    setStats(s=>{const n={...s,ai:s.ai+1};LS.set("rxai_stats",n);return n;});
    const src=[];
    try{
      setAiStep("🔍 Recherche PubMed...");
      const pm1=await pubmed(`${pt.diag} pharmacotherapy treatment 2022 2023 2024`,5);
      const pm2=await pubmed(`${pt.diag} ${pt.sev} severity medication RCT`,3);
      setAiStep("💊 Vérification OpenFDA...");
      const firstDrug=pt.curDrugs?.[0]?.dci||"";
      const fdaData=firstDrug?await fda(firstDrug):null;
      if(pm1.length||pm2.length)src.push("PubMed NCBI");
      if(fdaData)src.push("OpenFDA");
      setAiSrc(src);
      let ctx="";
      if(pm1.length){ctx+=`\n📚 ÉTUDES PUBMED — ${pt.diag}:\n`;pm1.forEach((a,i)=>ctx+=`${i+1}. ${a.title}\n   ${a.authors} (${a.year}) [PMID:${a.pmid}]\n`);}
      if(pm2.length){ctx+=`\n📚 SÉVÉRITÉ (${pt.sev}):\n`;pm2.forEach((a,i)=>ctx+=`${i+1}. ${a.title} (${a.year}) [PMID:${a.pmid}]\n`);}
      if(fdaData){ctx+=`\n🔴 OPENFDA — ${firstDrug}:\n• Interactions: ${fdaData.interactions||"N/A"}\n• Contre-indications: ${fdaData.contra||"N/A"}\n`;}
      const meds=pt.curDrugs?.length?pt.curDrugs.map(d=>`${d.dci}${d.dose?" "+d.dose:""}${d.freq?" — "+d.freq:""}`).join(", "):"Aucun";
      const prompt=`Tu es un expert en psychopharmacologie clinique.

PATIENT: ${pt.name}, ${pt.age} ans, ${pt.sex==="m"?"M":"F"}
Profession: ${pt.job||"—"} | Antécédents: ${pt.chr||"aucun"}
Médicaments actuels: ${meds}
Symptômes: ${pt.sym}
Diagnostic: ${pt.diag} | Sévérité: ${SEVLB[pt.sev]||pt.sev} | Durée: ${pt.dur||"—"}
Notes: ${pt.note||"—"}

DONNÉES TEMPS RÉEL:
${ctx||"Utiliser guidelines HAS/APA/NICE/WFSBP"}

FORMAT OBLIGATOIRE:
═══════════════════════════════
📊 ANALYSE CLINIQUE
[Résumé 2-3 lignes]

💊 SUGGESTION PRINCIPALE
Médicament: [DCI]
• Classe: ... | Dose initiale: ... | Dose cible: ...
• Durée minimale: ... | Niveau de preuve: [A/B/C]
• Justification: [citer PMIDs si disponibles]

⚠️ CONTRE-INDICATIONS & INTERACTIONS
• [selon profil + données FDA]

🔄 ALTERNATIVES
• Option 2: [DCI + dose] | Option 3: [DCI + dose]

📚 RÉFÉRENCES: [PMIDs utilisés]

🩺 SUIVI: Réévaluation [délai] | Bilan [si nécessaire]
═══════════════════════════════
⚠️ Suggestions consultatives. Décision finale = médecin traitant.`;

      setAiStep("🤖 Gemini analyse...");
      const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${doc.key}`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.2,maxOutputTokens:2500}})
      });
      const data=await r.json();
      if(data.error)throw new Error(data.error.message);
      const txt=data.candidates?.[0]?.content?.parts?.[0]?.text||"";
      if(!txt)throw new Error("Réponse vide");
      setAiRes(txt);setRxText(txt);
      toast_show("✅ تم التحليل بناءً على دراسات حقيقية");
    }catch(e){toast_show("❌ "+e.message,"err");}
    finally{setAiLd(false);setAiStep("");}
  };

  // ── STYLES ──
  const fi={padding:"10px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,fontFamily:"inherit",fontSize:14,color:C.text,outline:"none",background:"#fff",width:"100%",boxSizing:"border-box"};
  const bp={display:"inline-flex",alignItems:"center",gap:7,padding:"11px 20px",background:C.teal,color:"#fff",border:"none",borderRadius:9,fontFamily:"inherit",fontSize:14,fontWeight:700,cursor:"pointer"};
  const bs={display:"inline-flex",alignItems:"center",gap:7,padding:"11px 20px",background:"#fff",color:C.text,border:`1.5px solid ${C.border}`,borderRadius:9,fontFamily:"inherit",fontSize:14,fontWeight:700,cursor:"pointer"};

  const Fl=({label,req,children,half})=>(

      {children}

  const filtPts=search.trim()?patients.filter(p=>p.name.toLowerCase().includes(search.toLowerCase())||p.diag.toLowerCase().includes(search.toLowerCase())):patients;

  // ── LOGIN ──
  if(view===VIEWS.LOGIN)return(
    <div style={{fontFamily:"Tahoma,Arial,sans-serif",minHeight:"100vh",background:`linear-gradient(135deg,${C.navy},#0f3460,#16213e)`,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.14)",borderRadius:20,padding:"36px 28px",width:"100%",maxWidth:420}}>
        <div style={{display:"flex",alignItems:"center",gap:10,justifyContent:"center",marginBottom:8}}>
          <div style={{width:48,height:48,background:`linear-gradient(135deg,${C.teal},${C.teal2})`,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>💊</div>
          <div style={{fontSize:28,fontWeight:900,color:"#fff"}}>Rx<span style={{color:C.teal2}}>AI</span></div>
        </div>
        <p style={{textAlign:"center",color:"rgba(255,255,255,.5)",fontSize:13,marginBottom:24}}>Assistant Médical Psychiatrique ذكي</p>

          <div key={k} style={{marginBottom:13}}>
            <label style={{color:"rgba(255,255,255,.7)",fontSize:12,marginBottom:5,display:"block"}}>{lb}</label>

              type={tp} value={lf[k]} onChange={e=>setLf({...lf,[k]:e.target.value})} placeholder={ph} onKeyDown={e=>e.key==="Enter"&&doLogin()}/>
          </div>
        ))}
        <button style={{width:"100%",padding:14,background:C.teal,color:"#fff",border:"none",borderRadius:10,fontFamily:"inherit",fontSize:16,fontWeight:700,cursor:"pointer",marginTop:6}} onClick={doLogin}>
          Connexion — دخول ←
        </button>
        <div style={{marginTop:13,padding:10,background:"rgba(245,158,11,.12)",border:"1px solid rgba(245,158,11,.25)",borderRadius:8,color:"rgba(255,255,255,.65)",fontSize:11,lineHeight:1.7,textAlign:"center"}}>

                    <div>
                      <div style={{fontSize:14,fontWeight:700,direction:"rtl"}}>{p.name}</div>
                      <div style={{fontSize:12,color:C.gray2,marginTop:1,direction:"rtl"}}>{p.age} ans · {p.job||"—"}</div>
                    </div>
                    <div style={{textAlign:"left"}}>
                      <span style={{background:C.tealL,color:C.teal,fontSize:11,padding:"2px 8px",borderRadius:20,fontWeight:600,display:"block",marginBottom:3}}>{p.diag}</span>
                      <div style={{fontSize:10,color:C.gray2}}>📅 {p.date}</div>
                    </div>
                  </div>
                ))}
              </Card>
            </div>
          )}

          {/* ── NEW PATIENT ── */}
          {view===VIEWS.NEW&&(
            <div style={{padding:16}}>
              <div style={{fontSize:18,fontWeight:700,marginBottom:2,direction:"rtl"}}>{pt.id?`تعديل: ${pt.name}`:"ملف مريض جديد"}</div>
              <div style={{fontSize:13,color:C.gray2,marginBottom:15}}>Nouveau dossier patient</div>
              <Card icon="👤" title="Informations patient / معلومات المريض">
                <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                  <Fl label="Nom *" half><input style={fi} value={pt.name} onChange={e=>setPt({...pt,name:e.target.value})} placeholder="Ahmed Ben Ali"/></Fl>
                  <Fl label="Âge *" half><input style={fi} type="number" value={pt.age} onChange={e=>setPt({...pt,age:e.target.value})} placeholder="35"/></Fl>
                </div>
                <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                  <Fl label="Sexe" half>
                    <select style={fi} value={pt.sex} onChange={e=>setPt({...pt,sex:e.target.value})}>
                      <option value="m">Homme — ذكر</option>
                      <option value="f">Femme — أنثى</option>
                    </select>
                  </Fl>
                  <Fl label="Profession" half><input style={fi} value={pt.job} onChange={e=>setPt({...pt,job:e.target.value})} placeholder="Enseignant"/></Fl>
                </div>
                <Fl label="Antécédents médicaux"><input style={fi} value={pt.chr} onChange={e=>setPt({...pt,chr:e.target.value})} placeholder="Diabète, HTA..."/></Fl>
                <Fl label="Médicaments actuels / الأدوية الحالية">
                  <DrugAC list={pt.curDrugs||[]} onChange={l=>setPt({...pt,curDrugs:l})}/>
                </Fl>
              </Card>
              <Card icon="🩺" title="Données cliniques / البيانات السريرية">
                <Fl label="Symptômes *">
                  <textarea style={{...fi,minHeight:80,resize:"vertical",lineHeight:1.6}} value={pt.sym} onChange={e=>setPt({...pt,sym:e.target.value})} placeholder="Dépression sévère avec insomnie depuis 3 semaines..."/>
                </Fl>
                <Fl label="Diagnostic *">
                  <input style={fi} value={pt.diag} onChange={e=>setPt({...pt,diag:e.target.value})} placeholder="Épisode dépressif majeur F32.2"/>
                </Fl>
                <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                  <Fl label="Sévérité" half>
                    <select style={fi} value={pt.sev} onChange={e=>setPt({...pt,sev:e.target.value})}>
                      <option value="mild">Légère — خفيفة</option>
                      <option value="moderate">Modérée — متوسطة</option>
                      <option value="severe">Sévère — شديدة</option>
                    </select>
                  </Fl>
                  <Fl label="Durée" half><input style={fi} value={pt.dur} onChange={e=>setPt({...pt,dur:e.target.value})} placeholder="3 semaines"/></Fl>
                </div>
                <Fl label="Notes cliniques">
                  <textarea style={{...fi,minHeight:65,resize:"vertical",lineHeight:1.6}} value={pt.note} onChange={e=>setPt({...pt,note:e.target.value})} placeholder="Notes du médecin..."/>
                </Fl>
              </Card>
              <div style={{display:"flex",gap:10,justifyContent:"flex-end",flexWrap:"wrap"}}>
                <button style={bs} onClick={()=>goto(VIEWS.DASH)}>↩ رجوع</button>
                <button style={bs} onClick={()=>savePt()}>💾 حفظ المريض</button>
                <button style={bp} onClick={goToAI}>🤖 اقتراح دوائي</button>
              </div>
            </div>
          )}

          {/* ── AI ── */}
          {view===VIEWS.AI&&(
            <div style={{padding:16}}>
              <div style={{fontSize:18,fontWeight:700,marginBottom:2,direction:"rtl"}}>الاقتراح الدوائي الذكي</div>
              <div style={{fontSize:13,color:C.gray2,marginBottom:15}}>PubMed + OpenFDA + Gemini — Recherche en temps réel</div>
              <div style={{background:`linear-gradient(135deg,${C.navy},#0f3460)`,borderRadius:14,padding:20}}>
                <div style={{color:"#fff",fontSize:15,fontWeight:700,marginBottom:4,direction:"rtl"}}>🔬 استشارة مبنية على أدلة علمية حقيقية</div>
                <p style={{color:"rgba(255,255,255,.5)",fontSize:12,marginBottom:13}}>{pt.name} · {pt.age} ans · {pt.sex==="m"?"M":"F"} · {pt.diag} · {SEVLB[pt.sev]}</p>
                <div style={{display:"flex",gap:4,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
                  {["🔍 PubMed","›","💊 OpenFDA","›","🤖 Gemini","›","📋 Résultat"].map((s,i)=>(
                    s==="›"?<span key={i} style={{color:"rgba(255,255,255,.3)",fontSize:11}}>›</span>
                    :<span key={i} style={{background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.15)",borderRadius:6,padding:"3px 7px",color:"rgba(255,255,255,.75)",fontSize:10}}>{s}</span>
                  ))}
                </div>
                <div style={{background:"rgba(245,158,11,.14)",border:"1px solid rgba(245,158,11,.28)",borderRadius:8,padding:"9px 11px",marginBottom:12,color:"rgba(255,255,255,.8)",fontSize:11,lineHeight:1.7,direction:"rtl"}}>
                  ⚠️ هذه الاقتراحات استشارية فقط. القرار العلاجي النهائي يعود حصراً للطبيب المعالج.
                </div>
                <button style={{width:"100%",padding:13,background:aiLd?"#444":C.teal,color:"#fff",border:"none",borderRadius:9,fontFamily:"inherit",fontSize:15,fontWeight:700,cursor:aiLd?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}
                  disabled={aiLd} onClick={runAI}>
                  {aiLd?(<><span style={{width:15,height:15,border:"2px solid rgba(255,255,255,.3)",borderTopColor:"#fff",borderRadius:"50%",display:"inline-block",animation:"spin .8s linear infinite"}}/><span style={{fontSize:12}}>{aiStep}</span></>):"✨ Lancer l'analyse complète"}
                </button>
                {aiSrc.length>0&&(
                  <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap",alignItems:"center"}}>
                    <span style={{color:"rgba(255,255,255,.4)",fontSize:10,direction:"rtl"}}>مصادر:</span>
                    {aiSrc.map(s=><span key={s} style={{background:"rgba(13,148,136,.3)",border:"1px solid rgba(13,148,136,.5)",color:C.teal2,fontSize:10,padding:"1px 7px",borderRadius:15,fontWeight:700}}>✓ {s}</span>)}
                  </div>
                )}
                {aiRes&&(
                  <div style={{marginTop:12,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.12)",borderRadius:10,padding:13}}>
                    <div style={{color:"rgba(255,255,255,.88)",fontSize:12,lineHeight:1.9,whiteSpace:"pre-wrap",direction:"ltr",textAlign:"left",fontFamily:"monospace",maxHeight:360,overflowY:"auto"}}>{aiRes}</div>
                    <div style={{display:"flex",gap:8,marginTop:11,flexWrap:"wrap"}}>
                      <button style={{flex:1,padding:"9px 13px",background:C.teal,color:"#fff",border:"none",borderRadius:8,fontFamily:"inherit",fontSize:13,fontWeight:600,cursor:"pointer",direction:"rtl"}} onClick={()=>setView(VIEWS.RX)}>✅ استخدام في الوصفة</button>
                      <button style={{flex:1,padding:"9px 13px",background:"rgba(255,255,255,.08)",color:"rgba(255,255,255,.7)",border:"1px solid rgba(255,255,255,.15)",borderRadius:8,fontFamily:"inherit",fontSize:13,cursor:"pointer",direction:"rtl"}} onClick={runAI}>🔄 Régénérer</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* ── PRESCRIPTION ── */}
          {view===VIEWS.RX&&(
            <div style={{padding:16}}>
              <div className="no-print" style={{fontSize:18,fontWeight:700,marginBottom:2,direction:"rtl"}}>الوصفة الطبية النهائية</div>
              <div className="no-print" style={{fontSize:13,color:C.gray2,marginBottom:15,direction:"rtl"}}>راجع وعدّل — القرار للطبيب</div>
              <div style={{background:"#fff",borderRadius:14,boxShadow:"0 4px 20px rgba(0,0,0,.1)",overflow:"hidden"}}>
                <div style={{background:`linear-gradient(135deg,${C.navy},${C.navy2})`,padding:"15px 19px",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontSize:17,fontWeight:900,color:"#fff",marginBottom:2}}>{doc.name}</div>
                    <div style={{color:"rgba(255,255,255,.6)",fontSize:12}}>{doc.spec}</div>
                    <div style={{color:"rgba(255,255,255,.4)",fontSize:11,marginTop:4}}>{dateStr}</div>
                    {aiSrc.length>0&&<div style={{display:"flex",gap:4,marginTop:5}}>{aiSrc.map(s=><span key={s} style={{background:"rgba(13,148,136,.3)",color:C.teal2,fontSize:9,padding:"1px 6px",borderRadius:9,fontWeight:700}}>✓{s}</span>)}</div>}
                  </div>
                  <div style={{fontSize:28,opacity:.35}}>💊</div>
                </div>
                <div style={{padding:16}}>
                  <div style={{fontSize:8,fontWeight:700,letterSpacing:"1.5px",color:C.gray2,textTransform:"uppercase",paddingBottom:4,borderBottom:`1px solid ${C.border}`,marginBottom:10}}>Patient / المريض</div>
                  {[{l:"Nom",v:pt.name},{l:"Âge/Sexe",v:`${pt.age} ans · ${pt.sex==="m"?"M":"F"}`},{l:"Diagnostic",v:pt.diag}].map((x,i)=>(
                    <div key={i} style={{display:"flex",gap:8,marginBottom:5}}>
                      <div style={{fontSize:11,color:C.gray2,minWidth:75}}>{x.l}:</div>
                      <div style={{fontSize:12,fontWeight:700}}>{x.v}</div>
                    </div>
                  ))}
                  <div className="no-print" style={{fontSize:8,fontWeight:700,letterSpacing:"1.5px",color:C.gray2,textTransform:"uppercase",paddingBottom:4,borderBottom:`1px solid ${C.border}`,margin:"12px 0 10px"}}>
                    Ajouter médicament / إضافة دواء
                  </div>
                  <div className="no-print">
                    <DrugAC list={rxDrugs} onChange={list=>{
                      setRxDrugs(list);
                      const t=list.map((d,i)=>`${i+1}. ${d.dci}${d.dose?" "+d.dose:""}${d.freq?" — "+d.freq:""}`).join("\n");
                      setRxText(aiRes?(aiRes+"\n\n"+t):t);
                    }} ph="Ajouter médicament à la prescription..."/>
                  </div>
                  <div style={{fontSize:8,fontWeight:700,letterSpacing:"1.5px",color:C.gray2,textTransform:"uppercase",paddingBottom:4,borderBottom:`1px solid ${C.border}`,margin:"12px 0 10px"}}>Ordonnance / الوصفة</div>
                  <textarea style={{width:"100%",minHeight:120,padding:11,border:`1.5px solid ${C.border}`,borderRadius:9,fontFamily:"inherit",fontSize:13,lineHeight:1.8,color:C.text,outline:"none",resize:"vertical",direction:"ltr",background:"#fafbfc",boxSizing:"border-box"}}
                    value={rxText} onChange={e=>setRxText(e.target.value)} placeholder="Prescription..."/>
                  <div style={{fontSize:8,fontWeight:700,letterSpacing:"1.5px",color:C.gray2,textTransform:"uppercase",paddingBottom:4,borderBottom:`1px solid ${C.border}`,margin:"12px 0 10px"}}>Instructions / تعليمات</div>
                  <textarea style={{width:"100%",minHeight:65,padding:11,border:`1.5px solid ${C.border}`,borderRadius:9,fontFamily:"inherit",fontSize:13,lineHeight:1.8,color:C.text,outline:"none",resize:"vertical",direction:"rtl",background:"#fafbfc",boxSizing:"border-box"}}
                    value={rxInst} onChange={e=>setRxInst(e.target.value)} placeholder="تعليمات للمريض..."/>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",background:"#f8fafc",borderTop:`1px solid ${C.border}`}}>
                  <div style={{fontSize:11,color:C.gray2}}>{dateStr}</div>
                  <div><div style={{fontSize:10,color:C.gray2}}>Signature — توقيع الطبيب</div><div style={{width:110,borderBottom:`1px solid ${C.border}`,marginTop:20}}/></div>
                </div>
              </div>
              <div className="no-print" style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:13,flexWrap:"wrap"}}>
                <button style={bs} onClick={()=>setView(VIEWS.AI)}>↩ رجوع</button>
                <button style={bs} onClick={()=>{const s={...pt,rxText};savePt(s);}}>💾 حفظ</button>
                <button style={{...bs,background:C.navy,color:"#fff",border:"none"}} onClick={()=>{setStats(s=>{const n={...s,today:s.today+1};LS.set("rxai_stats",n);return n;});window.print();}}>🖨️ طباعة</button>
              </div>
            </div>
          )}

          {/* ── SETTINGS ── */}
          {view===VIEWS.SET&&(
            <div style={{padding:16}}>
              <div style={{fontSize:18,fontWeight:700,marginBottom:2,direction:"rtl"}}>الإعدادات</div>
              <div style={{fontSize:13,color:C.gray2,marginBottom:15}}>Paramètres de l'application</div>
              <div style={{background:"#fff",borderRadius:14,boxShadow:"0 2px 8px rgba(0,0,0,.07)",padding:18,marginBottom:14}}>
                <h3 style={{fontSize:14,fontWeight:700,marginBottom:14,paddingBottom:8,borderBottom:`1px solid ${C.border}`,direction:"rtl"}}>معلومات الطبيب</h3>
                {[["Nom","name","text"],["Spécialité","spec","text"],["Gemini API Key","key","password"]].map(([lb,k,tp])=>(
                  <div key={k} style={{marginBottom:12}}>
                    <label style={{fontSize:12,fontWeight:700,color:C.gray3,display:"block",marginBottom:5}}>{lb}</label>
                    <input style={{...fi,direction:k==="key"?"ltr":"inherit"}} type={tp} value={sf[k]} onChange={e=>setSf({...sf,[k]:e.target.value})} placeholder={k==="key"?"AIza...":""}/>
                  </div>
                ))}
                <button style={{...bp,width:"100%",justifyContent:"center"}} onClick={()=>{
                  const d={name:sf.name,spec:sf.spec,key:sf.key};
                  setDoc(d);LS.set("rxai_doc",d);
                  toast_show("✅ Paramètres enregistrés");
                }}>💾 Enregistrer</button>
              </div>
              <div style={{background:`linear-gradient(135deg,${C.navy},${C.navy2})`,borderRadius:13,padding:15}}>
                <div style={{color:C.teal2,fontSize:13,fontWeight:700,marginBottom:11,direction:"rtl"}}>🔬 مصادر البيانات الطبية</div>
                {[{i:"🔬",n:"PubMed NCBI",d:"+35M articles médicaux (2020-2024)",f:"Gratuit — sans clé"},
                  {i:"💊",n:"OpenFDA",d:"Base FDA — interactions & contre-ind.",f:"Gratuit — sans clé"},
                  {i:"🤖",n:"Gemini 1.5 Flash",d:"Analyse et formulation clinique",f:"Clé API gratuite requise"}
                ].map((s,i)=>(
                  <div key={i} style={{display:"flex",gap:9,marginBottom:9,padding:"9px 10px",background:"rgba(255,255,255,.05)",borderRadius:9}}>
                    <span style={{fontSize:18}}>{s.i}</span>
                    <div>
                      <div style={{color:"#fff",fontSize:12,fontWeight:700}}>{s.n}</div>
                      <div style={{color:"rgba(255,255,255,.5)",fontSize:10,marginTop:1,lineHeight:1.4}}>{s.d}</div>
                      <span style={{background:"rgba(13,148,136,.3)",color:C.teal2,fontSize:9,padding:"1px 6px",borderRadius:8,display:"inline-block",marginTop:4}}>{s.f}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

        </div>
      </div>

      {/* BOTTOM NAV */}
      <div className="no-print" style={{position:"fixed",bottom:0,left:0,right:0,background:C.navy,display:"flex",borderTop:"1px solid rgba(255,255,255,.1)",zIndex:100,height:56}}>
        {[{v:VIEWS.DASH,i:"🏠",l:"الرئيسية"},{v:VIEWS.NEW,i:"➕",l:"مريض جديد"},{v:VIEWS.SET,i:"⚙️",l:"الإعدادات"}].map(n=>{
          const act=n.v===VIEWS.NEW?isNew:view===n.v;
          return(
            <button key={n.v} onClick={()=>goto(n.v)} style={{flex:1,padding:"7px 0",background:"transparent",border:"none",cursor:"pointer",fontFamily:"inherit",color:act?C.teal2:"rgba(255,255,255,.5)",display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
              <span style={{fontSize:19}}>{n.i}</span>
              <span style={{fontSize:9,direction:"rtl",fontWeight:act?700:400}}>{n.l}</span>
              {act&&<div style={{width:3,height:3,borderRadius:"50%",background:C.teal2}}/>}
            </button>
          );
        })}
      </div>

      {toast&&<div style={{position:"fixed",bottom:66,left:"50%",transform:"translateX(-50%)",background:toast.type==="err"?C.red:C.teal,color:"#fff",padding:"10px 22px",borderRadius:9,fontSize:14,zIndex:999,boxShadow:"0 4px 16px rgba(0,0,0,.25)",whiteSpace:"nowrap"}}>{toast.msg}</div>}
    </div>
  );
}

// ── SERVICE WORKER (PWA) ──
if("serviceWorker" in navigator){
  const swCode = `
const CACHE = "rxai-v1";
const ASSETS = ["/"];
self.addEventListener("install", e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
  self.skipWaiting();
});
self.addEventListener("activate", e => {
  e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener("fetch", e => {
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match("/"))));
});`;
  const swBlob = new Blob([swCode], {type:"application/javascript"});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(RxAI));
</script>
</body>
